name: Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: mt
            project: dineinmtg
          - flavor: mt
            project: dineinmtv
          - flavor: mt
            project: dineinmta
          - flavor: rw
            project: dineinrwg
          - flavor: rw
            project: dineinrwv
          - flavor: rw
            project: dineinrwa
    defaults:
      run:
        working-directory: dinein_app
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build web release
        run: ./scripts/build_web_release.sh --flavor "${{ matrix.flavor }}" --skip-checks

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy build/web --project-name="${{ matrix.project }}"
